spring.application.name=backend

# Server Configuration
server.port=${PORT:8080}

# Database Configuration (H2 for local, override with ENV for prod)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/webhookdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update

# Security Configuration
jwt.secret=${JWT_SECRET:v9y$B&E)H@McQfTjWnZr4u7x!A%C*F-JaNdRgUkXp2s5v8y/B?E(G+KbPeShVmYq}
jwt.expiration=${JWT_EXPIRATION:604800000}

# WebHookHub Configuration
webhook.base-url=${APP_BASE_URL:http://localhost:8080}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USER}
spring.mail.password=${SMTP_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
